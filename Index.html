<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nebula Meet</title>

<style>
:root{
  --bg:#08111f;
  --bg2:#0d1b2d;
  --glass:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.1);
  --cyan:#00d2ff;
  --blue:#5b7cff;
  --danger:#ff4d6d;
  --shadow:0 10px 40px rgba(0,0,0,.45);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Inter,system-ui,sans-serif;
  background:
    radial-gradient(circle at top left,#173963 0%,transparent 35%),
    radial-gradient(circle at top right,#1d306a 0%,transparent 35%),
    linear-gradient(135deg,var(--bg),var(--bg2));
  color:white;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

button,input{
  border:none;
  outline:none;
  font-family:inherit;
}

button{
  cursor:pointer;
}

.hidden{
  display:none!important;
}

#landing{
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:30px;
}

.hero{
  width:min(1200px,100%);
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:60px;
}

@media(max-width:900px){
  .hero{
    grid-template-columns:1fr;
  }
}

.left{
  display:flex;
  flex-direction:column;
  gap:24px;
  justify-content:center;
}

.badge{
  width:max-content;
  padding:10px 18px;
  border-radius:999px;
  background:rgba(0,210,255,.08);
  border:1px solid rgba(0,210,255,.25);
  color:#8fe7ff;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.08em;
}

.title{
  font-size:clamp(48px,8vw,92px);
  line-height:.92;
  font-weight:800;
  letter-spacing:-.05em;
}

.title span{
  background:linear-gradient(90deg,#fff,#7addff,#9ea8ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  color:#a6bbd1;
  line-height:1.8;
  font-size:17px;
  max-width:620px;
}

.card{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:32px;
  padding:30px;
  backdrop-filter:blur(20px);
  box-shadow:var(--shadow);
}

.form{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.label{
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:#9fc2ea;
}

.input{
  width:100%;
  height:58px;
  border-radius:18px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  color:white;
  padding:0 18px;
  font-size:16px;
}

.actions{
  display:flex;
  gap:14px;
}

.primary,
.secondary{
  height:58px;
  border-radius:18px;
  font-weight:700;
  transition:.25s;
}

.primary{
  flex:1;
  background:linear-gradient(135deg,var(--cyan),var(--blue));
  color:white;
}

.secondary{
  width:180px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  color:white;
}

.primary:hover,
.secondary:hover{
  transform:translateY(-2px);
}

#meeting{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  position:relative;
}

.topbar{
  height:76px;
  padding:0 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo{
  width:42px;
  height:42px;
  border-radius:14px;
  background:linear-gradient(135deg,var(--cyan),var(--blue));
}

.room-box{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 16px;
  border-radius:16px;
  background:var(--glass);
  border:1px solid var(--border);
}

.copy-btn{
  width:38px;
  height:38px;
  border-radius:12px;
  background:rgba(255,255,255,.06);
  color:white;
}

#grid{
  flex:1;
  overflow:auto;
  padding:10px 20px 130px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:18px;
}

.tile{
  position:relative;
  aspect-ratio:16/9;
  border-radius:28px;
  overflow:hidden;
  background:black;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:var(--shadow);
}

.tile video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  background:
    linear-gradient(to top,rgba(0,0,0,.72),transparent 40%),
    linear-gradient(to bottom,rgba(0,0,0,.25),transparent 30%);
}

.top{
  display:flex;
  justify-content:flex-end;
  padding:14px;
}

.badge2{
  padding:8px 12px;
  border-radius:999px;
  background:rgba(0,0,0,.45);
  border:1px solid rgba(255,255,255,.08);
  font-size:12px;
}

.bottom{
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.name{
  font-size:16px;
  font-weight:700;
}

.controls{
  position:absolute;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:16px;
  padding:18px;
  border-radius:28px;
  background:rgba(10,18,30,.75);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(20px);
  box-shadow:var(--shadow);
}

.control{
  width:66px;
  height:66px;
  border-radius:22px;
  background:rgba(255,255,255,.06);
  color:white;
  font-size:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.25s;
}

.control.active{
  background:linear-gradient(135deg,var(--cyan),var(--blue));
}

.control.off{
  background:rgba(255,77,109,.25);
}

.control.leave{
  background:linear-gradient(135deg,#ff4d6d,#ff7086);
}

.control:hover{
  transform:translateY(-2px);
}

.toast-wrap{
  position:fixed;
  top:20px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  z-index:9999;
}

.toast{
  min-width:280px;
  padding:16px 18px;
  border-radius:18px;
  background:rgba(10,18,30,.92);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(18px);
}

.toast-title{
  font-weight:700;
  margin-bottom:4px;
}

.toast-msg{
  color:#aec3d8;
  font-size:14px;
  line-height:1.5;
}
</style>
</head>

<body>

<section id="landing">

<div class="hero">

<div class="left">

<div class="badge">
PRODUCTION WEBRTC MEETING
</div>

<div class="title">
Meet without <span>limits.</span>
</div>

<div class="subtitle">
Modern Zoom / Google Meet inspired online meeting platform with real WebRTC connections and live screen sharing.
</div>

</div>

<div class="card">

<div class="form">

<div class="field">
<div class="label">Display Name</div>
<input id="username" class="input" placeholder="Enter your name">
</div>

<div class="field">
<div class="label">Room Code</div>
<input id="room" class="input" placeholder="Create or join room">
</div>

<div class="actions">

<button id="createBtn" class="primary">
Create Meeting
</button>

<button id="joinBtn" class="secondary">
Join Room
</button>

</div>

</div>

</div>

</div>

</section>

<section id="meeting" class="hidden">

<div class="topbar">

<div class="brand">
<div class="logo"></div>
<h2>Nebula Meet</h2>
</div>

<div class="room-box">
<span id="roomLabel"></span>
<button id="copyBtn" class="copy-btn">⧉</button>
</div>

</div>

<div id="grid"></div>

<div class="controls">

<button id="micBtn" class="control active">🎤</button>

<button id="camBtn" class="control active">📹</button>

<button id="screenBtn" class="control">🖥️</button>

<button id="leaveBtn" class="control leave">✕</button>

</div>

</section>

<div class="toast-wrap" id="toasts"></div>

<script>
(() => {

const AppState = {

  roomId:null,
  userId:crypto.randomUUID(),
  username:null,

  localStream:null,
  screenStream:null,

  peers:new Map(),

  channel:null,

  screenSharing:false
};

const UI = {

  landing:document.getElementById("landing"),
  meeting:document.getElementById("meeting"),

  username:document.getElementById("username"),
  room:document.getElementById("room"),

  createBtn:document.getElementById("createBtn"),
  joinBtn:document.getElementById("joinBtn"),

  roomLabel:document.getElementById("roomLabel"),

  copyBtn:document.getElementById("copyBtn"),

  grid:document.getElementById("grid"),

  micBtn:document.getElementById("micBtn"),
  camBtn:document.getElementById("camBtn"),
  screenBtn:document.getElementById("screenBtn"),
  leaveBtn:document.getElementById("leaveBtn"),

  toasts:document.getElementById("toasts")
};

const STUN = {

  iceServers:[
    {
      urls:"stun:stun.l.google.com:19302"
    }
  ]
};

function toast(title,msg){

  const el = document.createElement("div");

  el.className = "toast";

  el.innerHTML = `
    <div class="toast-title">${title}</div>
    <div class="toast-msg">${msg}</div>
  `;

  UI.toasts.appendChild(el);

  setTimeout(() => {

    el.remove();

  },4000);
}

function createRoomId(){

  return (
    Math.random().toString(36).substring(2,6).toUpperCase()
    + "-"
    +
    Math.random().toString(36).substring(2,6).toUpperCase()
  );
}

async function getMedia(){

  return await navigator.mediaDevices.getUserMedia({

    video:true,
    audio:true
  });
}

function createTile(id,name,stream,local=false){

  let tile = document.getElementById("tile-" + id);

  if(tile){
    tile.remove();
  }

  tile = document.createElement("div");

  tile.className = "tile";
  tile.id = "tile-" + id;

  const video = document.createElement("video");

  video.autoplay = true;
  video.playsInline = true;

  if(local){
    video.muted = true;
  }

  video.srcObject = stream;

  const overlay = document.createElement("div");

  overlay.className = "overlay";

  overlay.innerHTML = `
    <div class="top">
      <div class="badge2">
        ${local ? "You" : "Connected"}
      </div>
    </div>

    <div class="bottom">
      <div class="name">
        ${name}
      </div>
    </div>
  `;

  tile.appendChild(video);
  tile.appendChild(overlay);

  UI.grid.appendChild(tile);
}

function broadcast(data){

  AppState.channel.postMessage({

    ...data,

    roomId:AppState.roomId,

    from:AppState.userId
  });
}

async function joinRoom(roomId){

  AppState.roomId = roomId;

  AppState.username = UI.username.value.trim();

  AppState.localStream = await getMedia();

  createTile(

    AppState.userId,

    AppState.username,

    AppState.localStream,

    true
  );

  AppState.channel = new BroadcastChannel(

    "nebula-" + roomId
  );

  AppState.channel.onmessage = handleSignal;

  UI.roomLabel.textContent = roomId;

  UI.landing.classList.add("hidden");

  UI.meeting.classList.remove("hidden");

  broadcast({

    type:"presence",

    username:AppState.username
  });

  toast(
    "Connected",
    "Joined room " + roomId
  );
}

async function handleSignal(event){

  const msg = event.data;

  if(msg.roomId !== AppState.roomId){
    return;
  }

  if(msg.from === AppState.userId){
    return;
  }

  switch(msg.type){

    case "presence":
      await handlePresence(msg);
      break;

    case "offer":
      await handleOffer(msg);
      break;

    case "answer":
      await handleAnswer(msg);
      break;

    case "ice":
      await handleIce(msg);
      break;

    case "leave":
      removePeer(msg.from);
      break;
  }
}

async function createPeer(peerId,username,initiator){

  const pc = new RTCPeerConnection(STUN);

  AppState.localStream.getTracks().forEach(track => {

    pc.addTrack(track,AppState.localStream);
  });

  const remoteStream = new MediaStream();

  pc.ontrack = e => {

    e.streams[0].getTracks().forEach(track => {

      remoteStream.addTrack(track);
    });

    createTile(

      peerId,

      username,

      remoteStream
    );
  };

  pc.onicecandidate = e => {

    if(e.candidate){

      broadcast({

        type:"ice",

        target:peerId,

        candidate:e.candidate
      });
    }
  };

  AppState.peers.set(peerId,{
    pc,
    username
  });

  if(initiator){

    const offer = await pc.createOffer();

    await pc.setLocalDescription(offer);

    broadcast({

      type:"offer",

      target:peerId,

      username:AppState.username,

      sdp:offer
    });
  }

  return pc;
}

async function handlePresence(msg){

  if(!AppState.peers.has(msg.from)){

    await createPeer(

      msg.from,

      msg.username,

      true
    );
  }
}

async function handleOffer(msg){

  if(msg.target !== AppState.userId){
    return;
  }

  const pc = await createPeer(

    msg.from,

    msg.username,

    false
  );

  await pc.setRemoteDescription(

    new RTCSessionDescription(msg.sdp)
  );

  const answer = await pc.createAnswer();

  await pc.setLocalDescription(answer);

  broadcast({

    type:"answer",

    target:msg.from,

    sdp:answer
  });
}

async function handleAnswer(msg){

  if(msg.target !== AppState.userId){
    return;
  }

  const peer = AppState.peers.get(msg.from);

  if(!peer){
    return;
  }

  await peer.pc.setRemoteDescription(

    new RTCSessionDescription(msg.sdp)
  );
}

async function handleIce(msg){

  if(msg.target !== AppState.userId){
    return;
  }

  const peer = AppState.peers.get(msg.from);

  if(!peer){
    return;
  }

  try{

    await peer.pc.addIceCandidate(

      new RTCIceCandidate(msg.candidate)
    );

  }catch(err){

    console.error(err);
  }
}

function removePeer(peerId){

  const peer = AppState.peers.get(peerId);

  if(peer){

    peer.pc.close();

    AppState.peers.delete(peerId);
  }

  const tile = document.getElementById("tile-" + peerId);

  if(tile){
    tile.remove();
  }
}

async function toggleScreenShare(){

  if(AppState.screenSharing){

    stopScreenShare();
    return;
  }

  try{

    if(
      !navigator.mediaDevices ||
      !navigator.mediaDevices.getDisplayMedia
    ){

      throw new Error(
        "Screen sharing not supported on this browser/device."
      );
    }

    const secure =
      location.protocol === "https:"
      ||
      location.hostname === "localhost";

    if(!secure){

      throw new Error(
        "HTTPS required for screen sharing."
      );
    }

    const screenStream =
      await navigator.mediaDevices.getDisplayMedia({

        video:{
          displaySurface:"monitor",
          cursor:"always",
          frameRate:30
        },

        audio:true
      });

    const screenTrack =
      screenStream.getVideoTracks()[0];

    AppState.screenStream = screenStream;

    AppState.screenSharing = true;

    AppState.peers.forEach(async peer => {

      const sender =
        peer.pc.getSenders().find(s =>

          s.track &&
          s.track.kind === "video"
        );

      if(sender){

        await sender.replaceTrack(screenTrack);
      }
    });

    const localVideo = document.querySelector(

      "#tile-" + AppState.userId + " video"
    );

    if(localVideo){

      localVideo.srcObject = screenStream;
    }

    screenTrack.onended = () => {

      stopScreenShare();
    };

    UI.screenBtn.classList.add("active");

    toast(
      "Screen sharing started",
      "Entire screen/window/tab is now visible."
    );

  }catch(err){

    console.error(err);

    toast(
      "Screen sharing failed",
      err.message
    );
  }
}

async function stopScreenShare(){

  if(!AppState.screenStream){
    return;
  }

  const cameraTrack =
    AppState.localStream.getVideoTracks()[0];

  AppState.peers.forEach(async peer => {

    const sender =
      peer.pc.getSenders().find(s =>

        s.track &&
        s.track.kind === "video"
      );

    if(sender){

      await sender.replaceTrack(cameraTrack);
    }
  });

  AppState.screenStream.getTracks().forEach(track => {

    track.stop();
  });

  AppState.screenStream = null;

  AppState.screenSharing = false;

  const localVideo = document.querySelector(

    "#tile-" + AppState.userId + " video"
  );

  if(localVideo){

    localVideo.srcObject = AppState.localStream;
  }

  UI.screenBtn.classList.remove("active");

  toast(
    "Screen sharing stopped",
    "Returned to camera."
  );
}

function leaveMeeting(){

  broadcast({
    type:"leave"
  });

  if(AppState.channel){

    AppState.channel.close();
  }

  AppState.peers.forEach(peer => {

    peer.pc.close();
  });

  AppState.peers.clear();

  if(AppState.localStream){

    AppState.localStream.getTracks().forEach(track => {

      track.stop();
    });
  }

  if(AppState.screenStream){

    AppState.screenStream.getTracks().forEach(track => {

      track.stop();
    });
  }

  UI.grid.innerHTML = "";

  UI.meeting.classList.add("hidden");

  UI.landing.classList.remove("hidden");
}

UI.createBtn.onclick = async () => {

  const username = UI.username.value.trim();

  if(!username){

    toast(
      "Missing name",
      "Please enter display name."
    );

    return;
  }

  const room = createRoomId();

  UI.room.value = room;

  await joinRoom(room);
};

UI.joinBtn.onclick = async () => {

  const username = UI.username.value.trim();

  const room = UI.room.value.trim();

  if(!username){

    toast(
      "Missing name",
      "Please enter display name."
    );

    return;
  }

  if(!room){

    toast(
      "Missing room",
      "Please enter room code."
    );

    return;
  }

  await joinRoom(room);
};

UI.copyBtn.onclick = async () => {

  await navigator.clipboard.writeText(

    AppState.roomId
  );

  toast(
    "Copied",
    "Room code copied."
  );
};

UI.micBtn.onclick = () => {

  const track =
    AppState.localStream.getAudioTracks()[0];

  track.enabled = !track.enabled;

  UI.micBtn.classList.toggle(
    "off",
    !track.enabled
  );
};

UI.camBtn.onclick = () => {

  const track =
    AppState.localStream.getVideoTracks()[0];

  track.enabled = !track.enabled;

  UI.camBtn.classList.toggle(
    "off",
    !track.enabled
  );
};

UI.screenBtn.onclick = toggleScreenShare;

UI.leaveBtn.onclick = leaveMeeting;

window.addEventListener("keydown",e => {

  const key = e.key.toLowerCase();

  if(key === "m"){
    UI.micBtn.click();
  }

  if(key === "v"){
    UI.camBtn.click();
  }

  if(key === "s"){
    UI.screenBtn.click();
  }

  if(e.key === "Escape"){
    leaveMeeting();
  }
});

})();
</script>

</body>
  </html>
