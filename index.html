<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nebula Meet X</title>

<style>

:root{
  --bg:#050816;
  --panel:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.08);
  --cyan:#00d4ff;
  --blue:#5b7cff;
  --danger:#ff4d6d;
  --text:#ffffff;
  --muted:#9eb3c8;
  --shadow:0 20px 60px rgba(0,0,0,.45);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Inter,system-ui,sans-serif;
  background:
  radial-gradient(circle at top left,#14305d 0%,transparent 30%),
  radial-gradient(circle at top right,#192f70 0%,transparent 30%),
  linear-gradient(135deg,#050816,#081221,#0c1629);
  color:white;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
  linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:42px 42px;
  pointer-events:none;
}

button,input{
  border:none;
  outline:none;
  font-family:inherit;
}

button{
  cursor:pointer;
}

.hidden{
  display:none!important;
}

#landing{
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:30px;
}

.hero{
  width:min(1180px,100%);
  display:grid;
  grid-template-columns:1fr 460px;
  gap:60px;
}

@media(max-width:980px){

  .hero{
    grid-template-columns:1fr;
  }
}

.left{
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:26px;
}

.badge{
  width:max-content;
  padding:10px 18px;
  border-radius:999px;
  background:rgba(0,212,255,.08);
  border:1px solid rgba(0,212,255,.2);
  color:#90ebff;
  font-size:12px;
  letter-spacing:.08em;
}

.title{
  font-size:clamp(56px,8vw,96px);
  font-weight:800;
  line-height:.9;
  letter-spacing:-.06em;
}

.title span{
  background:linear-gradient(90deg,#fff,#7ae7ff,#8ea0ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  color:var(--muted);
  line-height:1.8;
  max-width:640px;
  font-size:17px;
}

.panel{
  background:var(--panel);
  border:1px solid var(--border);
  backdrop-filter:blur(20px);
  border-radius:34px;
  padding:28px;
  box-shadow:var(--shadow);
}

.form{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.label{
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:#a7cfff;
}

.input{
  width:100%;
  height:58px;
  border-radius:18px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  padding:0 18px;
  color:white;
  font-size:16px;
}

.row{
  display:flex;
  gap:14px;
}

.primary,
.secondary{
  height:58px;
  border-radius:18px;
  font-weight:700;
  transition:.25s;
}

.primary{
  flex:1;
  background:linear-gradient(135deg,var(--cyan),var(--blue));
  color:white;
}

.secondary{
  width:180px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  color:white;
}

.primary:hover,
.secondary:hover{
  transform:translateY(-2px);
}

#meeting{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
}

.topbar{
  height:80px;
  padding:0 22px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.brand{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo{
  width:42px;
  height:42px;
  border-radius:14px;
  background:linear-gradient(135deg,var(--cyan),var(--blue));
}

.room{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 16px;
  border-radius:18px;
  background:var(--panel);
  border:1px solid var(--border);
}

.copy{
  width:38px;
  height:38px;
  border-radius:12px;
  background:rgba(255,255,255,.05);
  color:white;
}

#grid{
  flex:1;
  overflow:auto;
  padding:10px 22px 140px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:18px;
}

.tile{
  position:relative;
  aspect-ratio:16/9;
  overflow:hidden;
  border-radius:28px;
  background:black;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:var(--shadow);
}

.tile video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  background:
  linear-gradient(to top,rgba(0,0,0,.75),transparent 42%),
  linear-gradient(to bottom,rgba(0,0,0,.25),transparent 24%);
}

.top{
  display:flex;
  justify-content:flex-end;
  padding:14px;
}

.status{
  padding:8px 12px;
  border-radius:999px;
  background:rgba(0,0,0,.4);
  border:1px solid rgba(255,255,255,.08);
  font-size:12px;
}

.bottom{
  padding:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.name{
  font-weight:700;
  font-size:16px;
}

.controls{
  position:absolute;
  left:50%;
  bottom:24px;
  transform:translateX(-50%);
  display:flex;
  gap:16px;
  padding:18px;
  border-radius:30px;
  background:rgba(10,18,30,.8);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(22px);
  box-shadow:var(--shadow);
}

.ctrl{
  width:68px;
  height:68px;
  border-radius:24px;
  background:rgba(255,255,255,.06);
  color:white;
  font-size:24px;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:.25s;
}

.ctrl:hover{
  transform:translateY(-2px);
}

.ctrl.active{
  background:linear-gradient(135deg,var(--cyan),var(--blue));
}

.ctrl.off{
  background:rgba(255,77,109,.25);
}

.ctrl.leave{
  background:linear-gradient(135deg,#ff4d6d,#ff7b92);
}

#toastWrap{
  position:fixed;
  top:20px;
  right:20px;
  z-index:9999;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.toast{
  min-width:300px;
  padding:16px 18px;
  border-radius:20px;
  background:rgba(10,18,30,.92);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(18px);
}

.toast h4{
  margin-bottom:6px;
}

.toast p{
  color:#b4c7db;
  font-size:14px;
  line-height:1.5;
}

</style>
</head>

<body>

<section id="landing">

<div class="hero">

<div class="left">

<div class="badge">
REAL WEBRTC MEETING PLATFORM
</div>

<div class="title">
Meet at the speed of <span>light.</span>
</div>

<div class="subtitle">
Production-grade browser-native meeting experience inspired by Zoom, Google Meet, Linear and Vercel.
</div>

</div>

<div class="panel">

<div class="form">

<div class="field">
<div class="label">Display Name</div>
<input id="username" class="input" placeholder="Your name">
</div>

<div class="field">
<div class="label">Room Code</div>
<input id="roomInput" class="input" placeholder="Room code">
</div>

<div class="row">

<button id="createBtn" class="primary">
Create Meeting
</button>

<button id="joinBtn" class="secondary">
Join
</button>

</div>

</div>

</div>

</div>

</section>

<section id="meeting" class="hidden">

<div class="topbar">

<div class="brand">
<div class="logo"></div>
<h2>Nebula Meet X</h2>
</div>

<div class="room">
<span id="roomLabel"></span>
<button id="copyBtn" class="copy">⧉</button>
</div>

</div>

<div id="grid"></div>

<div class="controls">

<button id="micBtn" class="ctrl active">🎤</button>

<button id="camBtn" class="ctrl active">📹</button>

<button id="screenBtn" class="ctrl">🖥️</button>

<button id="leaveBtn" class="ctrl leave">✕</button>

</div>

</section>

<div id="toastWrap"></div>

<script>

(() => {

const state = {

  roomId:null,
  userId:crypto.randomUUID(),
  username:null,

  localStream:null,
  screenStream:null,

  peers:new Map(),

  channel:null,

  sharing:false
};

const stun = {

  iceServers:[
    {
      urls:"stun:stun.l.google.com:19302"
    }
  ]
};

const landing = document.getElementById("landing");
const meeting = document.getElementById("meeting");

const usernameInput = document.getElementById("username");
const roomInput = document.getElementById("roomInput");

const createBtn = document.getElementById("createBtn");
const joinBtn = document.getElementById("joinBtn");

const roomLabel = document.getElementById("roomLabel");

const grid = document.getElementById("grid");

const micBtn = document.getElementById("micBtn");
const camBtn = document.getElementById("camBtn");
const screenBtn = document.getElementById("screenBtn");
const leaveBtn = document.getElementById("leaveBtn");

const copyBtn = document.getElementById("copyBtn");

const toastWrap = document.getElementById("toastWrap");

function toast(title,msg){

  const el = document.createElement("div");

  el.className = "toast";

  el.innerHTML = `
    <h4>${title}</h4>
    <p>${msg}</p>
  `;

  toastWrap.appendChild(el);

  setTimeout(() => {

    el.remove();

  },4500);
}

function randomRoom(){

  return (
    Math.random().toString(36).slice(2,6).toUpperCase()
    + "-"
    +
    Math.random().toString(36).slice(2,6).toUpperCase()
  );
}

function createTile(id,name,stream,local=false){

  const old = document.getElementById("tile-"+id);

  if(old){
    old.remove();
  }

  const tile = document.createElement("div");

  tile.className = "tile";
  tile.id = "tile-"+id;

  const video = document.createElement("video");

  video.autoplay = true;
  video.playsInline = true;

  if(local){
    video.muted = true;
  }

  video.srcObject = stream;

  const overlay = document.createElement("div");

  overlay.className = "overlay";

  overlay.innerHTML = `
    <div class="top">
      <div class="status">
        ${local ? "You" : "Connected"}
      </div>
    </div>

    <div class="bottom">
      <div class="name">${name}</div>
    </div>
  `;

  tile.appendChild(video);
  tile.appendChild(overlay);

  grid.appendChild(tile);
}

async function getMedia(){

  return await navigator.mediaDevices.getUserMedia({

    video:true,
    audio:true
  });
}

function send(data){

  state.channel.postMessage({

    ...data,

    roomId:state.roomId,

    from:state.userId
  });
}

async function joinRoom(room){

  state.roomId = room;
  state.username = usernameInput.value.trim();

  state.localStream = await getMedia();

  createTile(

    state.userId,
    state.username,
    state.localStream,
    true
  );

  state.channel = new BroadcastChannel(

    "nebula-"+room
  );

  state.channel.onmessage = onSignal;

  roomLabel.textContent = room;

  landing.classList.add("hidden");
  meeting.classList.remove("hidden");

  send({

    type:"presence",

    username:state.username
  });

  toast(
    "Connected",
    "Joined meeting successfully."
  );
}

async function onSignal(event){

  const msg = event.data;

  if(msg.roomId !== state.roomId){
    return;
  }

  if(msg.from === state.userId){
    return;
  }

  switch(msg.type){

    case "presence":
      await onPresence(msg);
      break;

    case "offer":
      await onOffer(msg);
      break;

    case "answer":
      await onAnswer(msg);
      break;

    case "ice":
      await onIce(msg);
      break;

    case "leave":
      removePeer(msg.from);
      break;
  }
}

async function createPeer(peerId,username,initiator){

  const pc = new RTCPeerConnection(stun);

  state.localStream.getTracks().forEach(track => {

    pc.addTrack(track,state.localStream);
  });

  const remoteStream = new MediaStream();

  pc.ontrack = e => {

    e.streams[0].getTracks().forEach(track => {

      remoteStream.addTrack(track);
    });

    createTile(

      peerId,
      username,
      remoteStream
    );
  };

  pc.onicecandidate = e => {

    if(e.candidate){

      send({

        type:"ice",

        target:peerId,

        candidate:e.candidate
      });
    }
  };

  state.peers.set(peerId,{

    pc,
    username
  });

  if(initiator){

    const offer = await pc.createOffer();

    await pc.setLocalDescription(offer);

    send({

      type:"offer",

      target:peerId,

      username:state.username,

      sdp:offer
    });
  }

  return pc;
}

async function onPresence(msg){

  if(!state.peers.has(msg.from)){

    await createPeer(

      msg.from,
      msg.username,
      true
    );
  }
}

async function onOffer(msg){

  if(msg.target !== state.userId){
    return;
  }

  const pc = await createPeer(

    msg.from,
    msg.username,
    false
  );

  await pc.setRemoteDescription(

    new RTCSessionDescription(msg.sdp)
  );

  const answer = await pc.createAnswer();

  await pc.setLocalDescription(answer);

  send({

    type:"answer",

    target:msg.from,

    sdp:answer
  });
}

async function onAnswer(msg){

  if(msg.target !== state.userId){
    return;
  }

  const peer = state.peers.get(msg.from);

  if(!peer){
    return;
  }

  await peer.pc.setRemoteDescription(

    new RTCSessionDescription(msg.sdp)
  );
}

async function onIce(msg){

  if(msg.target !== state.userId){
    return;
  }

  const peer = state.peers.get(msg.from);

  if(!peer){
    return;
  }

  try{

    await peer.pc.addIceCandidate(

      new RTCIceCandidate(msg.candidate)
    );

  }catch(err){

    console.error(err);
  }
}

function removePeer(peerId){

  const peer = state.peers.get(peerId);

  if(peer){

    peer.pc.close();

    state.peers.delete(peerId);
  }

  const tile = document.getElementById("tile-"+peerId);

  if(tile){
    tile.remove();
  }
}

async function toggleScreenShare(){

  if(state.sharing){

    stopScreenShare();
    return;
  }

  try{

    if(!window.isSecureContext){

      throw new Error(
        "Open via HTTPS or localhost."
      );
    }

    if(
      !navigator.mediaDevices ||
      !navigator.mediaDevices.getDisplayMedia
    ){

      throw new Error(
        "Screen sharing unsupported on this browser."
      );
    }

    const stream =
      await navigator.mediaDevices.getDisplayMedia({

        video:true,
        audio:false
      });

    const track =
      stream.getVideoTracks()[0];

    state.screenStream = stream;
    state.sharing = true;

    state.peers.forEach(async peer => {

      const sender =
        peer.pc.getSenders().find(s =>

          s.track &&
          s.track.kind === "video"
        );

      if(sender){

        await sender.replaceTrack(track);
      }
    });

    const localVideo = document.querySelector(

      "#tile-"+state.userId+" video"
    );

    if(localVideo){

      localVideo.srcObject = stream;
    }

    track.onended = () => {

      stopScreenShare();
    };

    screenBtn.classList.add("active");

    toast(
      "Screen sharing started",
      "Your screen is now visible."
    );

  }catch(err){

    console.error(err);

    toast(
      "Screen sharing failed",
      err.message
    );
  }
}

async function stopScreenShare(){

  if(!state.screenStream){
    return;
  }

  const cameraTrack =
    state.localStream.getVideoTracks()[0];

  state.peers.forEach(async peer => {

    const sender =
      peer.pc.getSenders().find(s =>

        s.track &&
        s.track.kind === "video"
      );

    if(sender){

      await sender.replaceTrack(cameraTrack);
    }
  });

  state.screenStream.getTracks().forEach(track => {

    track.stop();
  });

  state.screenStream = null;
  state.sharing = false;

  const localVideo = document.querySelector(

    "#tile-"+state.userId+" video"
  );

  if(localVideo){

    localVideo.srcObject = state.localStream;
  }

  screenBtn.classList.remove("active");

  toast(
    "Screen sharing stopped",
    "Returned to camera."
  );
}

function leaveMeeting(){

  send({
    type:"leave"
  });

  if(state.channel){

    state.channel.close();
  }

  state.peers.forEach(peer => {

    peer.pc.close();
  });

  state.peers.clear();

  if(state.localStream){

    state.localStream.getTracks().forEach(t => t.stop());
  }

  if(state.screenStream){

    state.screenStream.getTracks().forEach(t => t.stop());
  }

  grid.innerHTML = "";

  meeting.classList.add("hidden");
  landing.classList.remove("hidden");
}

createBtn.onclick = async () => {

  const username =
    usernameInput.value.trim();

  if(!username){

    toast(
      "Missing name",
      "Enter your display name."
    );

    return;
  }

  const room = randomRoom();

  roomInput.value = room;

  await joinRoom(room);
};

joinBtn.onclick = async () => {

  const username =
    usernameInput.value.trim();

  const room =
    roomInput.value.trim();

  if(!username){

    toast(
      "Missing name",
      "Enter your display name."
    );

    return;
  }

  if(!room){

    toast(
      "Missing room",
      "Enter room code."
    );

    return;
  }

  await joinRoom(room);
};

copyBtn.onclick = async () => {

  await navigator.clipboard.writeText(

    state.roomId
  );

  toast(
    "Copied",
    "Meeting code copied."
  );
};

micBtn.onclick = () => {

  const track =
    state.localStream.getAudioTracks()[0];

  track.enabled = !track.enabled;

  micBtn.classList.toggle(
    "off",
    !track.enabled
  );
};

camBtn.onclick = () => {

  const track =
    state.localStream.getVideoTracks()[0];

  track.enabled = !track.enabled;

  camBtn.classList.toggle(
    "off",
    !track.enabled
  );
};

screenBtn.onclick = toggleScreenShare;

leaveBtn.onclick = leaveMeeting;

window.addEventListener("keydown",e => {

  const key = e.key.toLowerCase();

  if(key === "m"){
    micBtn.click();
  }

  if(key === "v"){
    camBtn.click();
  }

  if(key === "s"){
    screenBtn.click();
  }

  if(e.key === "Escape"){
    leaveMeeting();
  }
});

window.addEventListener("beforeunload",() => {

  leaveMeeting();
});

})();
</script>

</body>
</html>
